services:
  - type: web
    name: ezpay-ai-service
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PORT
        value: 8001
      - key: PYTHON_VERSION
        value: 3.10.12
      - key: EZPAY_BACKEND_URL
        sync: false
    # For Render Free Tier, we use systemPackages for Tesseract
    # However, Docker is more reliable for complex dependencies like OpenCV + Tesseract
    # If using Render's native Python environment instead of Docker:
    # systemPackages:
    #   - tesseract-ocr
    #   - libtesseract-dev
    #   - libgl1-mesa-glx
